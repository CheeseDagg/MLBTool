name: MLB daily slate
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
# Serialize runs so a scheduled run and a manual re-run can never push at the
# same instant. That simultaneous-push window is what caused the
# non-fast-forward ("! [rejected] ... fetch first") rejection.
concurrency:
  group: mlb-daily-publish
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history, so the rebase-onto-tip below is always clean
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install pybaseball MLB-StatsAPI pandas numpy
      - name: Pull data + publish slate
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: mlb
        run: |
          python mlb_pitchers.py
          python mlb_statcast.py
          python mlb_data.py || true
          python mlb_odds.py || true
          python mlb_publish.py
      - name: Commit fresh slate
        run: |
          git config user.name "mlb-bot"
          git config user.email "actions@github.com"
          # Land the freshly built slate on top of whatever is currently on main.
          # Each attempt re-fetches and resets HEAD to the live tip (working tree
          # untouched, so the just-built slate.json survives), re-stages, commits,
          # and pushes. The newest slate.json always wins and the push is a clean
          # fast-forward -- no merge, no rebase conflict -- even if the remote
          # moved during the run or this is a re-run of an old commit SHA.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --mixed origin/main
            git add mlb/data/slate.json
            if git diff --cached --quiet; then
              echo "Slate unchanged vs published -- nothing to commit."
              exit 0
            fi
            git commit -m "daily slate $(date -u +%F)"
            git push origin HEAD:main && { echo "Published on attempt $attempt."; exit 0; }
            echo "Remote advanced during push (attempt $attempt) -- retrying on new tip."
          done
          echo "::error::Failed to publish slate after 5 attempts."
          exit 1
