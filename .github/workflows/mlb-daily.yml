name: MLB daily slate
on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 21 * * *"   # 4pm CT: reprice on posted lineup cards
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: mlb-daily-publish
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install pybaseball MLB-StatsAPI pandas numpy
      - name: Pull data + publish slate
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: mlb
        run: |
          python mlb_pitchers.py
          python mlb_statcast.py
          python mlb_data.py || true
          python mlb_odds.py || true
          python mlb_hr.py || true
          python mlb_publish.py
      - name: Validate slate.json is browser-parseable
        run: |
          node -e "JSON.parse(require('fs').readFileSync('mlb/data/slate.json','utf8')); console.log('slate.json OK for browsers')"
      - name: Commit fresh slate
        run: |
          git config user.name "mlb-bot"
          git config user.email "actions@github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --mixed origin/main
            git add mlb/data/slate.json mlb/data/zone_cache.json mlb/data/hr_predictions.csv
            if git diff --cached --quiet; then
              echo "Slate unchanged vs published -- nothing to commit."
              exit 0
            fi
            git commit -m "daily slate $(date -u +%F)"
            git push origin HEAD:main && { echo "Published on attempt $attempt."; exit 0; }
            echo "Remote advanced during push (attempt $attempt) -- retrying on new tip."
          done
          echo "::error::Failed to publish slate after 5 attempts."
          exit 1
