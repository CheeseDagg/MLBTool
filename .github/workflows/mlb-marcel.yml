name: MLB Marcel talent refresh (weekly)
# Rebuilds the multi-year Marcel HR/PA talent table from statsapi yearByYear.
# Weekly is plenty — true talent moves slowly; the current-season blend updates daily
# from the board's own data. Manual trigger available.
on:
  schedule:
    - cron: "0 12 * * 1"      # Mondays 12:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  marcel:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Build talent table
        working-directory: mlb
        run: |
          python mlb_marcel.py --selftest
          python mlb_marcel_run.py
      - name: Commit talent
        run: |
          git config user.name mlb-bot
          git config user.email mlb-bot@users.noreply.github.com
          git add mlb/data/marcel_talent.json || true
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "Marcel talent refresh"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && { echo "pushed"; exit 0; }
            echo "push race - retry $i"; sleep 3
          done
          echo "push failed after 5 retries"; exit 1
