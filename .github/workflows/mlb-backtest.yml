name: MLB season backtest (one-shot)
# Manually triggered. Replays the season day-by-day (leak-free) and writes
# data/hr_backtest.csv + data/hr_backtest_panel.json. Heavy statsapi pull —
# run when you want a fresh verdict, not on a schedule.
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: pip install meteostat pandas
      - name: Replay season
        working-directory: mlb
        run: |
          python mlb_backtest.py --selftest
          python mlb_backtest_weather.py --selftest
          python mlb_backtest_run.py
      - name: Commit results
        run: |
          git config user.name mlb-bot
          git config user.email mlb-bot@users.noreply.github.com
          git add mlb/data/hr_backtest.csv mlb/data/hr_backtest_panel.json
          git commit -m "season backtest refresh" || echo "no changes"
          git push
