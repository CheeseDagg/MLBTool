name: MLB season backtest (one-shot)
# Manually triggered. Replays the season day-by-day (leak-free) and writes
# data/hr_backtest.csv + data/hr_backtest_panel.json. Heavy statsapi pull —
# run when you want a fresh verdict, not on a schedule.
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: pip install meteostat pandas
      - name: Replay season (legacy + Marcel head-to-head)
        working-directory: mlb
        run: |
          python mlb_marcel.py --selftest
          python mlb_backtest.py --selftest
          python mlb_backtest_weather.py --selftest
          python mlb_backtest_run.py
      - name: Commit results
        run: |
          git config user.name mlb-bot
          git config user.email mlb-bot@users.noreply.github.com
          git add mlb/data/hr_backtest.csv mlb/data/hr_backtest_panel.json mlb/data/hr_backtest_marcel.json mlb/data/hr_backtest_compare.json || true
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "season backtest refresh"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && { echo "pushed"; exit 0; }
            echo "push race - retry $i"; sleep 3
          done
          echo "push failed after 5 retries"; exit 1
